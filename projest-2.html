<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
</head>
<body>
    <h1> Student Register Form</h1>

    <label>Full Name:</label>
    <input type="name" placeholder="Enter your full name" required> <br><br>

    <label>Email:</label>
    <input type="email" placeholder="Enter your email" required><br><br>

    <label> Password:</label>
    <input type="password" placeholder="Enter your password" required><br><br>
    
    <label>Phone NUmber:</label>
    <input type="tel" placeholder="Enter your phone number" ><br><br>


    <label>Date of Birth:</label>
    <input type="date"><br><br>

    <label> Gender:</label>
    <input type="radio" name="gender">Male
    <input type="radio" name="gender">Female
    <input type="radio" name="gender">other
    <br><br>

    <label> Course</label>
    <select>
        <option value="">Select Couse</option>
        <option>CSE</option>
        <option>CSM</option>
        <option>ECE</option>
    </select>
    <br><br>
    <Label>Skills:</Label><br>
    
    <input type="checkbox">HTML
    <input type="checkbox">CSS
    <input type="checkbox">JS
    <input type="checkbox">REACT
    <br><br>


    <label>Address:</label>
    <textarea rows="5" cols="30"></textarea><br><br>
    
    
    <button type="submit">Register</button>
    <button type="reset">Clear</button>
</body>
</html>
